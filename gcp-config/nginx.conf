user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    access_log /dev/stdout;

    server {
        # Cloud Run menggunakan PORT env variable — defaultnya 8080
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        # Aktifkan gzip untuk performa lebih baik
        gzip on;
        gzip_types text/plain text/css application/json application/javascript;

        # Route semua request ke index.php (standar Laravel)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Proses file PHP via PHP-FPM
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # Aset statis — cache agresif
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Larang akses ke file sensitif
        location ~ /\. {
            deny all;
        }
    }
}
